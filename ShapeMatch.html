<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Tangram Match | KEA Digi</title>
    <link rel="stylesheet" href="keadigi.css" />
    <style>
        :root { --tile-size: 110px; --tile-gap: 0.75rem; --tile-columns: 4; }
        body.kea-page.shape-match-page, .shape-match-shell { overflow: hidden; }
        .shape-match-shell { height: 100vh; }
        .shape-match-main {
            flex: 1;
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: 0.75rem;
            padding: 1rem;
            overflow: hidden;
            border: 4px solid var(--kea-border);
            border-radius: calc(var(--kea-radius-lg) + 0.2rem);
            background:
                linear-gradient(180deg, rgba(76, 78, 84, 0.95), rgba(34, 36, 41, 0.98)),
                var(--kea-control-face-dark);
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.12), inset 0 -4px 0 rgba(0, 0, 0, 0.28);
        }
        .status-bar { display: grid; grid-template-columns: auto 1fr auto; gap: 0.75rem; align-items: center; padding: 0.8rem 0.95rem; }
        .status-cluster { display: inline-flex; gap: 0.45rem; flex-wrap: wrap; }
        .status-pill { display: inline-flex; align-items: center; min-height: 34px; padding: 0.3rem 0.62rem; border: 3px solid var(--kea-border); border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(234,231,221,.98)); font: 800 .78rem var(--kea-font-display); letter-spacing: .04em; text-transform: uppercase; white-space: nowrap; box-shadow: none; text-shadow: none; }
        .mode-pill { background: linear-gradient(180deg,#8ed8ff 0%,#2f9ee6 100%); }
        .typing-pill { background: linear-gradient(180deg,#ffd479 0%,#ffa300 100%); }
        .timer {
            justify-self: center;
            margin: 0;
            min-width: min(16rem, 42vw);
            padding: 0.72rem 1rem;
            text-align: center;
            font: 800 clamp(1.15rem,1.8vw,1.6rem)/1 var(--kea-font-mono);
            letter-spacing: 0.08em;
            transition: transform .18s ease;
        }
        .timer.pulse { transform: scale(1.06); }
        .combo-wrap { display: flex; align-items: center; gap: .55rem; justify-self: end; min-width: 0; }
        .combo-wrap.warning .combo-fill { background: linear-gradient(90deg,#ffec27,#ffa300); }
        .combo-wrap.warning .combo-count { color: #ffdf7a; }
        .combo-wrap.critical { animation: comboJitter .18s linear infinite; }
        .combo-wrap.critical .combo-fill { background: linear-gradient(90deg,#ff77a8,#ff004d); }
        .combo-wrap.critical .combo-count { color: #ff96b8; }
        @keyframes comboJitter { 0%,100% { transform: translateX(0); } 25%,75% { transform: translateX(-1px); } 50% { transform: translateX(1px); } }
        .combo-bar { width: min(210px,25vw); max-width: 210px; min-width: 112px; height: 20px; background: rgba(12,15,10,.78); border: 3px solid var(--kea-border); border-radius: 999px; position: relative; overflow: hidden; box-shadow: inset 0 3px 5px rgba(0,0,0,.34), inset 0 1px 0 rgba(255,255,255,.08); }
        .combo-fill { position: absolute; inset: 0 auto 0 0; width: 0%; background: linear-gradient(90deg,#00e436,#8dffb4); transition: width .1s linear, background .16s ease; }
        .combo-count {
            min-width: 88px;
            padding: 0.5rem 0.75rem;
            font: 800 .84rem var(--kea-font-mono);
            text-transform: uppercase;
            transition: color .16s ease;
            color: #8dff9c;
        }
        .play-area { min-height: 0; display: grid; grid-template-rows: minmax(0,1fr) minmax(0,1fr); gap: 0.75rem; }
        .zone {
            min-height: 0;
            display: grid;
            grid-template-rows: auto 1fr;
            gap: .45rem;
            padding: .7rem;
            overflow: hidden;
            background:
                linear-gradient(180deg, rgba(103, 107, 115, 0.92), rgba(53, 56, 62, 0.98));
            box-shadow: inset 0 2px 0 rgba(255, 255, 255, 0.1), inset 0 -3px 0 rgba(0, 0, 0, 0.26);
        }
        .zone-header { display: flex; justify-content: space-between; align-items: center; gap: .6rem; }
        .label { margin: 0; font: 800 .92rem var(--kea-font-display); letter-spacing: .08em; text-transform: uppercase; color: rgba(15, 16, 19, 0.92); text-shadow: 0 1px 0 rgba(255, 255, 255, 0.14); }
        .zone-hint { margin: 0; color: rgba(255, 248, 238, 0.86); font-size: .8rem; white-space: nowrap; }
        .slot-grid {
            min-height: 0;
            display: grid;
            grid-template-columns: repeat(var(--tile-columns), minmax(0,var(--tile-size)));
            grid-auto-rows: var(--tile-size);
            gap: var(--tile-gap);
            justify-content: center;
            align-content: center;
            overflow: hidden;
            padding: 0.7rem;
            border: 4px solid var(--kea-border);
            border-radius: calc(var(--kea-radius-lg) - 0.1rem);
            background:
                linear-gradient(180deg, rgba(34, 36, 41, 0.98), rgba(14, 15, 18, 1));
            box-shadow: inset 0 4px 8px rgba(0, 0, 0, 0.36), inset 0 1px 0 rgba(255, 255, 255, 0.08);

        .tile { display: flex; justify-content: center; align-items: center; background: rgba(194,195,199,.08); border: 4px dashed rgba(255,248,238,.42); position: relative; transition: transform .16s ease, border-color .16s ease, background .16s ease; }
        .slot-template { width: 100%; height: 100%; transition: opacity .18s ease, transform .18s ease; }
        .tile.highlight { border-color: var(--kea-accent); background: rgba(41,173,255,.12); transform: scale(1.02); }
        .tile.invalid { border-color: var(--kea-danger); background: rgba(255,0,77,.08); }
        .tile.filled { border-style: solid; border-color: rgba(255,248,238,.26); background: rgba(255,255,255,.04); }
        .tile.filled .slot-template { opacity: .06; transform: scale(.94); }
        .tile.complete { border-color: var(--kea-success); background: rgba(0,228,54,.08); }
        .shape {
            display: flex;
            justify-content: center;
            align-items: center;
            cursor: grab;
            position: relative;
            border: 4px solid rgba(255,248,238,.2);
            background:
                linear-gradient(180deg, rgba(88, 92, 98, 0.92), rgba(47, 49, 55, 0.98));
            box-shadow: inset 0 2px 0 rgba(255,255,255,.1), inset 0 -3px 0 rgba(0,0,0,.26);
            transition: transform .16s ease, border-color .16s ease, box-shadow .16s ease;
            touch-action: manipulation;
            overflow: hidden;
        }
        .shape svg { width: 100%; height: 100%; display: block; filter: drop-shadow(0 4px 4px rgba(0,0,0,.16)); }
        .shape:hover { transform: translateY(-2px); }
        .shape.selected { border-color: var(--kea-accent); box-shadow: 0 0 0 4px rgba(41,173,255,.22); }
        .shape.dragging { opacity: .72; }
        .shape.placed { position: absolute; inset: 0; width: 100%; height: 100%; background: transparent; box-shadow: none; cursor: grab; z-index: 2; }
        .shape.placed svg { filter: none; }
        .shape.snap-pop { animation: snapPop .22s ease; }
        .tile.spark { animation: slotSpark .28s ease; }
        @keyframes snapPop { 0% { transform: scale(.92); } 55% { transform: scale(1.05); } 100% { transform: scale(1); } }
        @keyframes slotSpark { 0% { box-shadow: 0 0 0 rgba(0,228,54,0); } 40% { box-shadow: 0 0 0 10px rgba(0,228,54,.22); } 100% { box-shadow: 0 0 0 rgba(0,228,54,0); } }
        .slot-badge, .piece-badge { position: absolute; top: .32rem; min-width: 1.55rem; min-height: 1.55rem; padding: 0 .32rem; display: inline-flex; align-items: center; justify-content: center; border: 2px solid var(--kea-border); border-radius: 999px; background: linear-gradient(180deg, rgba(255,255,255,.94), rgba(234,231,221,.98)); font: 800 .72rem var(--kea-font-display); z-index: 3; box-shadow: none; text-shadow: none; }
        .slot-badge { left: .32rem; }
        .piece-badge { right: .32rem; background: rgba(41,173,255,.18); }
        .board-complete { animation: boardWin .5s ease; }
        @keyframes boardWin { 0%,100% { transform: scale(1); } 50% { transform: scale(1.01); } }
        @media (max-width: 860px) { .status-bar { grid-template-columns: 1fr; justify-items: stretch; } .timer, .combo-wrap { justify-self: stretch; justify-content: center; } .zone-hint { display: none; } }
        @media (max-width: 640px) { .shape-match-main { padding: .55rem; gap: .55rem; } .status-bar, .zone { padding: .6rem; } .play-area { gap: .55rem; } }
    </style>
</head>
<body class="kea-page shape-match-page">
    <div class="kea-shell shape-match-shell">
        <header class="kea-topbar kea-topbar--centered">
            <a class="kea-back-link" href="index.html">Back to KEA Digi</a>
            <div class="kea-topbar__brand kea-topbar__brand--center">
                <p class="kea-eyebrow">Shapes and matching</p>
                <h1 class="kea-app-title">Tangram Match</h1>
                <p class="kea-app-subtitle">Drag, tap, or type a target-piece combo to snap matches into place.</p>

            <div class="kea-topbar__actions">
                <button class="kea-button" type="button" id="startButton">Start Game</button>

        <main class="shape-match-main">

                    <span class="status-pill" id="levelPill">Level 1</span>
                    <span class="status-pill mode-pill" id="modePill">1 shape</span>
                    <span class="status-pill typing-pill" id="typingPill">Type 1 + A</span>
                </div>
                <p class="timer kea-console-screen" id="timer">00:00.000</p>
                <div class="combo-wrap" id="comboWrap">
                    <div class="combo-bar" aria-hidden="true"><div class="combo-fill" id="comboFill"></div></div>
                    <div class="combo-count kea-console-screen" id="comboCount">Combo x0</div>
                </div>
            </section>
            <section class="play-area">
                <section class="zone kea-console-surface">
                    <div class="zone-header">
                        <p class="label kea-console-label">Targets</p>
                        <p class="zone-hint">Use any valid match for the slot.</p>
                    </div>
                    <div class="slot-grid board" id="board"></div>
                </section>
                <section class="zone kea-console-surface">
                    <div class="zone-header">
                        <p class="label kea-console-label">Pieces</p>
                        <p class="zone-hint">Touch: tap piece, then target. Keyboard: number + letter.</p>
                    </div>
                    <div class="slot-grid pieces" id="pieces"></div>
                </section>
            </section>
        </main>
    </div>
    <script>

            currentRound.pieces.forEach((piece) => pieces.appendChild(createPieceElement(piece)));
            syncBoardState(); fitBoardToViewport(); updateTypingHint();
        }

        function createPieceElement(piece) {
            const el = document.createElement('button'); el.type = 'button'; el.className = 'shape'; el.dataset.pieceId = piece.id; el.dataset.shortcut = piece.shortcut; el.setAttribute('draggable', 'true'); el.appendChild(makeSvg(piece.shapeType, piece.colorValue, '#111111', false));
            const badge = document.createElement('span'); badge.className = 'piece-badge'; badge.textContent = piece.shortcut; el.appendChild(badge);

            el.addEventListener('dragstart', (event) => { selectedPieceId = piece.id; el.classList.add('dragging'); event.dataTransfer.setData('text/plain', piece.id); });
            el.addEventListener('dragend', () => el.classList.remove('dragging'));

        }

        function selectPiece(pieceId) { selectedPieceId = pieceId; document.querySelectorAll('.shape').forEach((el) => el.classList.toggle('selected', el.dataset.pieceId === pieceId)); }
        function clearSelection() { selectedPieceId = null; document.querySelectorAll('.shape').forEach((el) => el.classList.remove('selected')); document.querySelectorAll('.tile').forEach((tile) => tile.classList.remove('highlight', 'invalid')); }

        function setPendingPiece(pieceId) { pendingPieceId = pieceId; updateTypingHint(); attemptKeyboardPlacement(); }

            typingPill.textContent = target && piece ? `${target.shortcut} + ${piece.shortcut}` : target ? `Target ${target.shortcut}` : piece ? `Piece ${piece.shortcut}` : 'Type 1 + A';
        }
        function movePieceToTray(pieceId, resetComboOnMove = true) { const piece = getPieceById(pieceId); if (!piece) return; piece.slotId = null; syncBoardState(); if (resetComboOnMove) resetCombo(); }
        function placementFx(slotId, pieceId) {
            const tile = document.querySelector(`.tile[data-slot-id="${slotId}"]`), piece = document.querySelector(`.shape[data-piece-id="${pieceId}"]`);

        function fitBoardToViewport() {

        }
        function resetCombo() { comboCount = 0; comboValue = 0; clearInterval(comboDecayInterval); updateComboDisplay(); }
        function startGame() { completingLevel = false; selectedPieceId = null; pendingTargetSlotId = null; pendingPieceId = null; currentRound = buildRound(level); updateHud(currentRound); renderBoard(); startTimer(); }
        const normalizeTargetKey = (event) => event.code && event.code.startsWith('Digit') ? (event.code === 'Digit0' ? '0' : event.code.replace('Digit', '')) : null;
        const normalizePieceKey = (event) => { const key = (event.key || '').toUpperCase(); return PIECE_KEYS.includes(key) ? key : null; };

        pieces.addEventListener('dragover', (event) => event.preventDefault());
        pieces.addEventListener('drop', (event) => { event.preventDefault(); const pieceId = event.dataTransfer.getData('text/plain'); if (pieceId) movePieceToTray(pieceId); });
        startButton.addEventListener('click', () => { level = 1; resetCombo(); timerDisplay.textContent = '00:00.000'; startGame(); });
        window.addEventListener('keydown', (event) => {
            if (!currentRound || !currentRound.typingMode || event.repeat) return;
            if (event.key === 'Escape') { clearSelection(); clearTypingSelection(); return; }
            const targetShortcut = normalizeTargetKey(event); if (targetShortcut) { const slot = getSlotByShortcut(targetShortcut); if (slot) { setPendingTarget(slot.slotId); return; } }
            const pieceShortcut = normalizePieceKey(event); if (pieceShortcut) { const piece = getPieceByShortcut(pieceShortcut); if (piece) { selectPiece(piece.id); setPendingPiece(piece.id); } }
        });
        window.addEventListener('resize', () => { if (currentRound) fitBoardToViewport(); });
        window.addEventListener('load', () => { timerDisplay.textContent = '00:00.000'; updateComboDisplay(); currentRound = buildRound(level); updateHud(currentRound); renderBoard(); });
    </script>
</body>
</html>
